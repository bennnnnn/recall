name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_api:
        description: Deploy API to Fly.io
        type: boolean
        default: true
      deploy_mobile:
        description: Build mobile with EAS (production profile)
        type: boolean
        default: false

jobs:
  deploy-api:
    if: ${{ inputs.deploy_api }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: fly deploy --remote-only

  deploy-mobile:
    if: ${{ inputs.deploy_mobile }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS production build
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: eas build --platform all --profile production --non-interactive --no-wait
