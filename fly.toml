# Fly.io config for the Recall API.
# See the README "Production deployment (Fly.io)" section for the full setup.
#
# Two processes: `app` serves HTTP/WebSocket (PROCESS_ROLE=api); `worker` runs
# Redis-stream jobs + schedulers (PROCESS_ROLE=worker). Scale each independently.

app = "recall-api"
primary_region = "iad" # change to your region; Neon DB is in us-east-2

[build]
  context = "apps/api"
  dockerfile = "Dockerfile"

[env]
  PROCESS_ROLE = "api"

[processes]
  app = "sh -c 'uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log'"
  worker = "sh -c 'PROCESS_ROLE=worker uv run python -m app.worker_main'"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

# WebSocket support is on by default for HTTP services on Fly.
# Health checks hit /health/ready (DB + Redis).
[[http_service.checks]]
  interval = "20s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/health/ready"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
  processes = ["worker"]
